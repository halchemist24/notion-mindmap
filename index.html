<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Mind Map</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#fff;color:#1a1a1a;height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;}

#toolbar{display:flex;align-items:center;gap:5px;padding:7px 12px;border-bottom:1px solid #e8e8e5;background:#fff;flex-shrink:0;flex-wrap:wrap;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.title{font-size:13px;font-weight:600;color:#37352f;margin-right:2px;}
#toolbar button{font-size:12px;padding:4px 9px;border:1px solid #e2e2de;border-radius:5px;background:#fff;color:#6b6b6b;cursor:pointer;transition:background .1s,color .1s;white-space:nowrap;}
#toolbar button:hover{background:#f1efe8;color:#37352f;}
#toolbar button:disabled{opacity:.32;cursor:default;pointer-events:none;}
#btn-copy{background:#37352f;color:#fff;border-color:#37352f;}
#btn-copy:hover{background:#555;border-color:#555;}
.sep{width:1px;height:18px;background:#e8e8e5;margin:0 1px;flex-shrink:0;}
#hint{margin-left:auto;font-size:11px;color:#b8b8b8;display:flex;gap:10px;flex-wrap:wrap;}
#hint span::before{content:'·';margin-right:3px;}
@media(max-width:600px){#hint{display:none;}}

#canvas-wrap{flex:1;overflow:hidden;position:relative;background:#fafaf8;touch-action:none;}
canvas#mc{display:block;cursor:grab;touch-action:none;}
canvas#mc.dragging{cursor:grabbing;}
#minimap{position:absolute;bottom:14px;right:14px;width:150px;height:94px;border:1px solid #e2e2de;border-radius:8px;background:rgba(255,255,255,.93);overflow:hidden;pointer-events:none;}
#minimap canvas{width:100%;height:100%;}

#node-editor{position:fixed;display:none;font-family:-apple-system,'Segoe UI',sans-serif;border:1.5px solid #378add;border-radius:6px;padding:4px 10px;background:#fff;font-size:13px;color:#37352f;outline:none;resize:none;overflow:hidden;text-align:center;line-height:1.5;z-index:200;min-width:60px;}

#ctx-menu{position:fixed;display:none;background:#fff;border:1px solid #e2e2de;border-radius:9px;padding:5px;box-shadow:0 6px 24px rgba(0,0,0,.12);z-index:300;min-width:178px;}
#ctx-menu .item{padding:7px 11px;font-size:13px;border-radius:5px;cursor:pointer;color:#37352f;display:flex;align-items:center;gap:7px;}
#ctx-menu .item:hover{background:#f1efe8;}
#ctx-menu .item.danger{color:#c0392b;}
#ctx-menu .item.danger:hover{background:#fff0ee;}
#ctx-menu .csep{height:1px;background:#efefec;margin:4px 0;}

#hl-picker{position:fixed;display:none;background:#fff;border:1px solid #e2e2de;border-radius:9px;padding:9px 12px;box-shadow:0 6px 24px rgba(0,0,0,.12);z-index:400;flex-direction:column;gap:7px;}
#hl-picker .hl-label{font-size:11px;color:#aaa;}
#hl-picker .hl-row{display:flex;gap:7px;align-items:center;}
.hl-dot{width:19px;height:19px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .12s;flex-shrink:0;}
.hl-dot:hover{transform:scale(1.3);}
.hl-dot.none-dot{background:#efefef;display:flex;align-items:center;justify-content:center;font-size:12px;color:#aaa;font-weight:500;}

/* ── 공용 모달 오버레이 ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;z-index:500;}
.modal-overlay.open{display:flex;}
.modal-box{background:#fff;border-radius:12px;padding:22px 24px;width:400px;max-width:92vw;box-shadow:0 12px 40px rgba(0,0,0,.16);display:flex;flex-direction:column;gap:14px;}
.modal-box .m-title{font-size:14px;font-weight:600;color:#37352f;}
.modal-box .m-desc{font-size:13px;color:#666;line-height:1.6;}
.modal-box .m-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:2px;}
.modal-box .m-btns button{font-size:13px;padding:6px 18px;border-radius:6px;cursor:pointer;border:1px solid #e2e2de;background:#fff;color:#6b6b6b;transition:background .1s;}
.modal-box .m-btns button:hover{background:#f1efe8;color:#37352f;}
.modal-box .m-btns button.danger{background:#c0392b;color:#fff;border-color:#c0392b;}
.modal-box .m-btns button.danger:hover{background:#a93226;border-color:#a93226;}
.modal-box .m-btns button.primary{background:#37352f;color:#fff;border-color:#37352f;}
.modal-box .m-btns button.primary:hover{background:#555;border-color:#555;}
/* ── 클립보드 붙여넣기 모달 (넓게) ── */
#paste-box{width:500px;}
#paste-box textarea{width:100%;height:130px;border:1px solid #e2e2de;border-radius:7px;padding:10px 12px;font-size:11.5px;font-family:monospace;color:#37352f;resize:vertical;outline:none;line-height:1.5;}
#paste-box textarea:focus{border-color:#378add;}
#paste-box .pb-err{font-size:12px;color:#c0392b;display:none;padding:2px 0;}

/* ── 토스트 알림 ── */
#toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%) translateY(10px);background:#37352f;color:#fff;font-size:12px;padding:8px 16px;border-radius:20px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:600;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

#statusbar{padding:3px 14px;font-size:11px;color:#c0c0c0;border-top:1px solid #e8e8e5;background:#fff;display:flex;gap:16px;flex-shrink:0;}
</style>
</head>
<body>

<div id="toolbar">
  <span class="title">🧠 Mind Map</span>
  <div class="sep"></div>
  <button id="btn-undo" disabled>↩ 실행취소</button>
  <button id="btn-redo" disabled>↪ 다시실행</button>
  <div class="sep"></div>
  <button id="btn-child">＋ 자식 노드</button>
  <button id="btn-sibling">⇢ 형제 노드</button>
  <button id="btn-root">◎ 루트 노드</button>
  <div class="sep"></div>
  <button id="btn-fit">⊡ 화면 맞춤</button>
  <div class="sep"></div>
  <button id="btn-copy">📋 클립보드에 저장</button>
  <button id="btn-paste">📂 클립보드에서 불러오기</button>
  <button id="btn-reset">↺ 초기화</button>
  <div id="hint">
    <span>더블클릭: 편집</span>
    <span>우클릭: 메뉴</span>
    <span>Ctrl+클릭/드래그: 다중선택</span>
    <span>Tab: 자식추가</span>
    <span>Del: 삭제</span>
    <span>Ctrl+Z/Y: 취소/재실행</span>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="mc"></canvas>
  <div id="minimap"><canvas id="mm"></canvas></div>
</div>

<textarea id="node-editor" rows="1"></textarea>
<div id="ctx-menu"></div>
<div id="hl-picker">
  <div class="hl-label">하이라이트 태그</div>
  <div class="hl-row"></div>
</div>

<!-- 확인 모달 (confirm 대체) -->
<div id="confirm-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="m-title" id="confirm-title">확인</div>
    <div class="m-desc" id="confirm-desc"></div>
    <div class="m-btns">
      <button id="confirm-cancel">취소</button>
      <button id="confirm-ok" class="danger">확인</button>
    </div>
  </div>
</div>

<!-- 클립보드 저장/불러오기 모달 -->
<div id="paste-modal" class="modal-overlay">
  <div class="modal-box" id="paste-box">
    <div class="m-title" id="paste-title">📂 클립보드에서 불러오기</div>
    <div class="m-desc" id="paste-desc"></div>
    <textarea id="paste-input" placeholder='저장 데이터를 붙여넣으세요 (Ctrl+V)'></textarea>
    <div class="pb-err" id="paste-err"></div>
    <div class="m-btns">
      <button id="paste-cancel">취소</button>
      <button id="paste-ok" class="primary">불러오기</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<div id="statusbar">
  <span id="stat-nodes">노드: 0</span>
  <span id="stat-zoom">줌: 100%</span>
  <span id="stat-selected">선택: 없음</span>
  <span id="stat-multi"></span>
</div>

<script>
// ══════════════════════════════════════════════
// 하이라이트 정의
// ══════════════════════════════════════════════
const HL=[
  {id:'red',   dot:'#ff4d4d',fill:'rgba(255,60,60,.13)',  border:'rgba(255,60,60,.55)'},
  {id:'orange',dot:'#ff9500',fill:'rgba(255,149,0,.13)',  border:'rgba(255,149,0,.55)'},
  {id:'yellow',dot:'#ffd60a',fill:'rgba(255,214,10,.22)', border:'rgba(210,170,0,.55)'},
  {id:'green', dot:'#34c759',fill:'rgba(52,199,89,.13)',  border:'rgba(52,199,89,.55)'},
  {id:'blue',  dot:'#007aff',fill:'rgba(0,122,255,.12)',  border:'rgba(0,122,255,.5)'},
];

// ══════════════════════════════════════════════
// 데이터
// ══════════════════════════════════════════════
let nodes=[],edges=[],nextId=1;
let selectedIds=new Set();

// ── Undo/Redo ─────────────────────────────────
const undoStack=[],redoStack=[],MAX_H=80;
function snap(){return JSON.stringify({nodes:nodes.map(n=>({...n})),edges:edges.map(e=>({...e})),nextId});}
function pushH(){undoStack.push(snap());if(undoStack.length>MAX_H)undoStack.shift();redoStack.length=0;syncUB();}
function applySnap(s){const d=JSON.parse(s);nodes=d.nodes;edges=d.edges;nextId=d.nextId;selectedIds.clear();draw();}
function undo(){if(!undoStack.length)return;redoStack.push(snap());applySnap(undoStack.pop());syncUB();}
function redo(){if(!redoStack.length)return;undoStack.push(snap());applySnap(redoStack.pop());syncUB();}
function syncUB(){document.getElementById('btn-undo').disabled=!undoStack.length;document.getElementById('btn-redo').disabled=!redoStack.length;}

// ── 그래프 헬퍼 ──────────────────────────────
function depth(id){let d=0,cur=id;for(let i=0;i<60;i++){const e=edges.find(e=>e.to===cur);if(!e)break;cur=e.from;d++;}return d;}
function childrenOf(id){return edges.filter(e=>e.from===id).map(e=>e.to);}
function parentOf(id){const e=edges.find(e=>e.to===id);return e?e.from:null;}
function mkNode(label,x,y,parentId=null){const id=nextId++;nodes.push({id,label,x,y,hl:null});if(parentId!=null)edges.push({from:parentId,to:id});return id;}
function rmTree(id){childrenOf(id).forEach(c=>rmTree(c));nodes=nodes.filter(n=>n.id!==id);edges=edges.filter(e=>e.from!==id&&e.to!==id);selectedIds.delete(id);}

// ── 팔레트 ──────────────────────────────────
const PAL=[
  {fill:'#37352f',stroke:'#37352f',text:'#fff'},
  {fill:'#e8f3fa',stroke:'#7ec0e8',text:'#2a6a8a'},
  {fill:'#e8f5ee',stroke:'#7dc9a0',text:'#276a44'},
  {fill:'#fdf3e1',stroke:'#f1bf6b',text:'#7a5500'},
  {fill:'#fae8f0',stroke:'#e897be',text:'#8a2a5a'},
  {fill:'#eeebfb',stroke:'#a89ce8',text:'#4a3aaa'},
  {fill:'#fdeee8',stroke:'#f0a07a',text:'#8a3a18'},
];
function colorOf(id){
  if(depth(id)===0)return PAL[0];
  let cur=id;
  for(let i=0;i<40;i++){const p=parentOf(cur);if(p==null)break;if(depth(p)===0){const idx=childrenOf(p).indexOf(cur);return PAL[(idx%6)+1];}cur=p;}
  return PAL[1];
}

// ══════════════════════════════════════════════
// 캔버스
// ══════════════════════════════════════════════
const wrap=document.getElementById('canvas-wrap');
const mc=document.getElementById('mc'),ctx=mc.getContext('2d');
const mm=document.getElementById('mm'),mctx=mm.getContext('2d');
let W,H,pan={x:0,y:0},zoom=1;
let dragging=null,dragOff={x:0,y:0},didDrag=false;
let panning=false,panStart={x:0,y:0},panOrig={x:0,y:0};
let lasso=null;

function resize(){
  const r=wrap.getBoundingClientRect();W=r.width;H=r.height;
  mc.width=W*devicePixelRatio;mc.height=H*devicePixelRatio;
  mc.style.width=W+'px';mc.style.height=H+'px';
  mm.width=300;mm.height=188;
  ctx.scale(devicePixelRatio,devicePixelRatio);draw();
}
function toSc(x,y){return{x:x*zoom+W/2+pan.x,y:y*zoom+H/2+pan.y};}
function toWo(x,y){return{x:(x-W/2-pan.x)/zoom,y:(y-H/2-pan.y)/zoom};}

const PX=16,PY=9,LH=18;
function measure(n){
  const isRoot=depth(n.id)===0,d=depth(n.id),fz=isRoot?14:d===1?13:12;
  ctx.font=`${isRoot?600:400} ${fz}px -apple-system,'Segoe UI',sans-serif`;
  const lines=n.label.split('\n'),mw=Math.max(50,...lines.map(l=>ctx.measureText(l).width));
  return{w:mw+PX*2,h:lines.length*LH+PY*2,fz,lines,isRoot};
}

function drawEdge(f,t){
  const fs=toSc(f.x,f.y),ts=toSc(t.x,t.y),d=depth(t.id),col=colorOf(t.id);
  ctx.beginPath();ctx.moveTo(fs.x,fs.y);
  const mx=(fs.x+ts.x)/2;
  ctx.bezierCurveTo(mx,fs.y,mx,ts.y,ts.x,ts.y);
  ctx.strokeStyle=col.stroke;ctx.lineWidth=d===1?1.8:d===2?1.2:.9;
  ctx.globalAlpha=d===1?.52:.36;ctx.stroke();ctx.globalAlpha=1;
}

function drawNode(n){
  const col=colorOf(n.id),m=measure(n),s=toSc(n.x,n.y);
  const x=s.x-m.w/2*zoom,y=s.y-m.h/2*zoom,w=m.w*zoom,h=m.h*zoom;
  const r=m.isRoot?10*zoom:6*zoom,isSel=selectedIds.has(n.id);
  const hl=n.hl?HL.find(c=>c.id===n.hl):null;
  if(hl){const p=7*zoom;ctx.beginPath();ctx.roundRect(x-p,y-p,w+p*2,h+p*2,r+p);ctx.fillStyle=hl.fill;ctx.fill();}
  if(isSel){ctx.beginPath();ctx.roundRect(x-3,y-3,w+6,h+6,r+3);ctx.strokeStyle='#378add';ctx.lineWidth=1.8;ctx.stroke();}
  ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fillStyle=col.fill;ctx.fill();
  if(!m.isRoot||hl){ctx.strokeStyle=hl?hl.border:col.stroke;ctx.lineWidth=hl?1.2:.8;ctx.stroke();}
  ctx.fillStyle=col.text;
  ctx.font=`${m.isRoot?600:400} ${Math.max(9,m.fz*zoom)}px -apple-system,'Segoe UI',sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  m.lines.forEach((line,li)=>ctx.fillText(line,s.x,s.y+(li-(m.lines.length-1)/2)*LH*zoom));
  if(hl){const dr=5.5*zoom,dx=x+w-dr*.6,dy=y+dr*.6;ctx.beginPath();ctx.arc(dx,dy,dr,0,Math.PI*2);ctx.fillStyle=hl.dot;ctx.fill();ctx.strokeStyle='rgba(255,255,255,.85)';ctx.lineWidth=1.4;ctx.stroke();}
}

function draw(){
  ctx.clearRect(0,0,W,H);
  const gs=28*zoom;ctx.strokeStyle='#f0eeeb';ctx.lineWidth=.5;
  const ox=(pan.x+W/2)%gs,oy=(pan.y+H/2)%gs;
  for(let x=ox-gs;x<W+gs;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=oy-gs;y<H+gs;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  edges.forEach(e=>{const f=nodes.find(n=>n.id===e.from),t=nodes.find(n=>n.id===e.to);if(f&&t)drawEdge(f,t);});
  nodes.forEach(n=>drawNode(n));
  if(lasso){
    const lx=Math.min(lasso.x1,lasso.x2),ly=Math.min(lasso.y1,lasso.y2);
    const lw=Math.abs(lasso.x2-lasso.x1),lh=Math.abs(lasso.y2-lasso.y1);
    ctx.beginPath();ctx.rect(lx,ly,lw,lh);ctx.fillStyle='rgba(55,138,221,.07)';ctx.fill();
    ctx.strokeStyle='rgba(55,138,221,.45)';ctx.lineWidth=1;ctx.setLineDash([4,3]);ctx.stroke();ctx.setLineDash([]);
  }
  drawMini();updateStatus();
}

function drawMini(){
  mctx.clearRect(0,0,300,188);mctx.fillStyle='#fafaf8';mctx.fillRect(0,0,300,188);
  if(!nodes.length)return;
  const xs=nodes.map(n=>n.x),ys=nodes.map(n=>n.y);
  const mnx=Math.min(...xs)-80,mxx=Math.max(...xs)+80,mny=Math.min(...ys)-50,mxy=Math.max(...ys)+50;
  const sc=Math.min(260/(mxx-mnx||1),160/(mxy-mny||1));
  const ox=150-(mnx+mxx)/2*sc,oy=94-(mny+mxy)/2*sc;
  edges.forEach(e=>{const f=nodes.find(n=>n.id===e.from),t=nodes.find(n=>n.id===e.to);if(!f||!t)return;mctx.beginPath();mctx.moveTo(f.x*sc+ox,f.y*sc+oy);mctx.lineTo(t.x*sc+ox,t.y*sc+oy);mctx.strokeStyle='#ccc';mctx.lineWidth=.8;mctx.stroke();});
  nodes.forEach(n=>{const col=colorOf(n.id);mctx.beginPath();mctx.arc(n.x*sc+ox,n.y*sc+oy,depth(n.id)===0?5:2.5,0,Math.PI*2);mctx.fillStyle=col.stroke;mctx.fill();});
  const v0=toWo(0,0),v1=toWo(W,H);mctx.strokeStyle='rgba(55,138,221,.4)';mctx.lineWidth=1;mctx.strokeRect(v0.x*sc+ox,v0.y*sc+oy,(v1.x-v0.x)*sc,(v1.y-v0.y)*sc);
}

function updateStatus(){
  document.getElementById('stat-nodes').textContent='노드: '+nodes.length;
  document.getElementById('stat-zoom').textContent='줌: '+Math.round(zoom*100)+'%';
  const sel=[...selectedIds];
  if(!sel.length){document.getElementById('stat-selected').textContent='선택: 없음';document.getElementById('stat-multi').textContent='';}
  else if(sel.length===1){const n=nodes.find(n=>n.id===sel[0]);document.getElementById('stat-selected').textContent='선택: '+(n?n.label.split('\n')[0]:'');document.getElementById('stat-multi').textContent='';}
  else{document.getElementById('stat-selected').textContent='선택: '+sel.length+'개 노드';document.getElementById('stat-multi').textContent='Del: 다중삭제  |  우클릭: 하이라이트';}
}

// ══════════════════════════════════════════════
// 토스트
// ══════════════════════════════════════════════
let toastTimer=null;
function showToast(msg,duration=2600){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),duration);
}

// ══════════════════════════════════════════════
// 자체 confirm 모달
// ══════════════════════════════════════════════
const confirmModal=document.getElementById('confirm-modal');
let confirmResolve=null;
function showConfirm(title,desc){
  document.getElementById('confirm-title').textContent=title;
  document.getElementById('confirm-desc').textContent=desc;
  confirmModal.classList.add('open');
  return new Promise(res=>{confirmResolve=res;});
}
document.getElementById('confirm-ok').onclick=()=>{confirmModal.classList.remove('open');if(confirmResolve)confirmResolve(true);confirmResolve=null;};
document.getElementById('confirm-cancel').onclick=()=>{confirmModal.classList.remove('open');if(confirmResolve)confirmResolve(false);confirmResolve=null;};
confirmModal.addEventListener('click',e=>{if(e.target===confirmModal){confirmModal.classList.remove('open');if(confirmResolve)confirmResolve(false);confirmResolve=null;}});

// ══════════════════════════════════════════════
// 클립보드 저장 / 불러오기
// ══════════════════════════════════════════════
function getMapData(){
  return JSON.stringify({_mindmap:true,_saved:new Date().toISOString(),nodes,edges,nextId});
}
function parseMapData(str){
  const d=JSON.parse(str.trim());
  if(!d.nodes||!d.edges||!d.nextId)throw new Error('invalid');
  return d;
}

// execCommand 기반 복사 (iframe에서도 작동)
function execCopy(text){
  const ta=document.createElement('textarea');
  ta.value=text;
  ta.style.cssText='position:fixed;top:-9999px;left:-9999px;opacity:0;';
  document.body.appendChild(ta);
  ta.focus();ta.select();
  const ok=document.execCommand('copy');
  document.body.removeChild(ta);
  return ok;
}

// 저장 버튼
document.getElementById('btn-copy').onclick=async()=>{
  const text=getMapData();
  // 1순위: 최신 API
  let ok=false;
  try{await navigator.clipboard.writeText(text);ok=true;}catch{}
  // 2순위: execCommand
  if(!ok){try{ok=execCopy(text);}catch{}}
  if(ok){
    showToast('✅ 클립보드에 저장됐어요!  노션 코드블록에 붙여넣어 보관하세요.');
  }else{
    // 둘 다 실패 시 → 모달에 텍스트 띄워서 수동 복사
    openSaveFallbackModal(text);
  }
};

document.getElementById('paste-ok').onclick=()=>{

// ══════════════════════════════════════════════
// 히트 테스트
// ══════════════════════════════════════════════
function hitNode(mx,my){
  for(let i=nodes.length-1;i>=0;i--){const n=nodes[i],m=measure(n),s=toSc(n.x,n.y);if(Math.abs(mx-s.x)<m.w/2*zoom&&Math.abs(my-s.y)<m.h/2*zoom)return n;}
  return null;
}

// ══════════════════════════════════════════════
// 마우스 이벤트
// ══════════════════════════════════════════════
mc.addEventListener('mousedown',e=>{
  if(e.button!==0)return;
  closeCtxMenu();closeHlPicker();
  const rect=mc.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const hit=hitNode(mx,my);
  if(e.ctrlKey||e.metaKey){
    if(hit){if(selectedIds.has(hit.id))selectedIds.delete(hit.id);else selectedIds.add(hit.id);draw();}
    else{lasso={x1:mx,y1:my,x2:mx,y2:my};}
    return;
  }
  if(e.altKey||!hit){if(hit){selectedIds.clear();selectedIds.add(hit.id);}panning=true;panStart={x:e.clientX,y:e.clientY};panOrig={x:pan.x,y:pan.y};mc.classList.add('dragging');draw();return;}
  if(!selectedIds.has(hit.id)){selectedIds.clear();selectedIds.add(hit.id);}
  dragging=hit;didDrag=false;const w=toWo(mx,my);dragOff={x:w.x-hit.x,y:w.y-hit.y};mc.classList.add('dragging');draw();
});

mc.addEventListener('mousemove',e=>{
  const rect=mc.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
  if(lasso){lasso.x2=mx;lasso.y2=my;draw();return;}
  if(dragging){
    didDrag=true;const w=toWo(mx,my);
    if(selectedIds.size>1&&selectedIds.has(dragging.id)){
      const dx=w.x-dragOff.x-dragging.x,dy=w.y-dragOff.y-dragging.y;
      selectedIds.forEach(id=>{const n=nodes.find(n=>n.id===id);if(n){n.x+=dx;n.y+=dy;}});
      dragOff={x:w.x-dragging.x,y:w.y-dragging.y};
    }else{dragging.x=w.x-dragOff.x;dragging.y=w.y-dragOff.y;}
    draw();return;
  }
  if(panning){pan.x=panOrig.x+(e.clientX-panStart.x);pan.y=panOrig.y+(e.clientY-panStart.y);draw();return;}
  mc.style.cursor=hitNode(mx,my)?'pointer':'grab';
});

mc.addEventListener('mouseup',e=>{
  mc.classList.remove('dragging');
  if(lasso){
    const lx1=Math.min(lasso.x1,lasso.x2),lx2=Math.max(lasso.x1,lasso.x2);
    const ly1=Math.min(lasso.y1,lasso.y2),ly2=Math.max(lasso.y1,lasso.y2);
    if(lx2-lx1>4||ly2-ly1>4)nodes.forEach(n=>{const s=toSc(n.x,n.y);if(s.x>=lx1&&s.x<=lx2&&s.y>=ly1&&s.y<=ly2)selectedIds.add(n.id);});
    lasso=null;draw();return;
  }
  if(dragging&&didDrag)pushH();
  dragging=null;panning=false;didDrag=false;mc.style.cursor='grab';
});

mc.addEventListener('dblclick',e=>{
  const rect=mc.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const hit=hitNode(mx,my);
  if(!hit){addRootAt(toWo(mx,my));return;}
  openEditor(hit);
});

mc.addEventListener('contextmenu',e=>{
  e.preventDefault();closeHlPicker();
  const rect=mc.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const hit=hitNode(mx,my);
  if(hit&&!selectedIds.has(hit.id)){selectedIds.clear();selectedIds.add(hit.id);draw();}
  showCtxMenu(e.clientX,e.clientY,hit,mx,my);
});

mc.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=mc.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const nz=Math.min(4,Math.max(.12,zoom*(1+-e.deltaY*.0008)));
  pan.x=mx-(mx-W/2-pan.x)*nz/zoom-W/2;pan.y=my-(my-H/2-pan.y)*nz/zoom-H/2;zoom=nz;draw();
},{passive:false});

// ══════════════════════════════════════════════
// 터치 이벤트 (모바일: 1손가락=이동, 2손가락=핀치줌, 탭=선택, 더블탭=편집, 롱프레스=컨텍스트메뉴)
// ══════════════════════════════════════════════
let touch1=null,touch2=null;          // 현재 터치 포인터
let tPanStart=null,tPanOrig=null;     // 1손가락 패닝
let tPinchDist0=0,tPinchZoom0=1;     // 2손가락 줌
let tPinchMid=null;                   // 핀치 중심점
let tDraggingNode=null,tDragOff=null,tDidDrag=false;
let tLongTimer=null;
let tLastTap=0,tLastNode=null;        // 더블탭 감지

function getTouchPos(touch){
  const rect=mc.getBoundingClientRect();
  return{x:touch.clientX-rect.left,y:touch.clientY-rect.top};
}
function dist2(a,b){return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);}
function midClient(a,b){return{x:(a.clientX+b.clientX)/2,y:(a.clientY+b.clientY)/2};}

mc.addEventListener('touchstart',e=>{
  e.preventDefault();
  closeCtxMenu();closeHlPicker();
  const touches=e.touches;

  if(touches.length===1){
    touch1=touches[0];touch2=null;
    const pos=getTouchPos(touch1);
    const hit=hitNode(pos.x,pos.y);

    // 더블탭 감지
    const now=Date.now();
    const isDoubleTap=now-tLastTap<320&&tLastNode===hit;
    tLastTap=now;tLastNode=hit;

    if(isDoubleTap){
      clearTimeout(tLongTimer);
      if(hit)openEditor(hit);
      else addRootAt(toWo(pos.x,pos.y));
      return;
    }

    // 롱프레스 감지 (500ms)
    clearTimeout(tLongTimer);
    tLongTimer=setTimeout(()=>{
      if(tDidDrag)return;
      const p2=getTouchPos(touch1);
      const hitL=hitNode(p2.x,p2.y);
      if(hitL&&!selectedIds.has(hitL.id)){selectedIds.clear();selectedIds.add(hitL.id);draw();}
      showCtxMenu(touch1.clientX,touch1.clientY,hitL,p2.x,p2.y);
    },500);

    tDidDrag=false;
    if(hit){
      // 노드 드래그
      if(!selectedIds.has(hit.id)){selectedIds.clear();selectedIds.add(hit.id);}
      tDraggingNode=hit;
      const w=toWo(pos.x,pos.y);
      tDragOff={x:w.x-hit.x,y:w.y-hit.y};
    }else{
      // 배경 패닝
      tDraggingNode=null;
      tPanStart={x:touch1.clientX,y:touch1.clientY};
      tPanOrig={x:pan.x,y:pan.y};
    }
  }

  if(touches.length===2){
    clearTimeout(tLongTimer);
    tDraggingNode=null;
    touch1=touches[0];touch2=touches[1];
    tPinchDist0=dist2(touch1,touch2);
    tPinchZoom0=zoom;
    const mid=midClient(touch1,touch2);
    const rect=mc.getBoundingClientRect();
    tPinchMid={x:mid.x-rect.left,y:mid.y-rect.top};
    tPanOrig={x:pan.x,y:pan.y};
    tPanStart={x:mid.x,y:mid.y};
  }
},{passive:false});

mc.addEventListener('touchmove',e=>{
  e.preventDefault();
  const touches=e.touches;

  if(touches.length===2){
    // 핀치 줌 + 2손가락 패닝
    const t1=touches[0],t2=touches[1];
    const curDist=dist2(t1,t2);
    const nz=Math.min(4,Math.max(.12,tPinchZoom0*(curDist/tPinchDist0)));
    // 핀치 중심점 기준 줌
    const mx=tPinchMid.x,my=tPinchMid.y;
    pan.x=mx-(mx-W/2-tPanOrig.x)*nz/tPinchZoom0-W/2;
    pan.y=my-(my-H/2-tPanOrig.y)*nz/tPinchZoom0-H/2;
    zoom=nz;
    // 2손가락 이동에 의한 패닝도 반영
    const mid=midClient(t1,t2);
    pan.x+=(mid.x-tPanStart.x);
    pan.y+=(mid.y-tPanStart.y);
    tPanStart={x:mid.x,y:mid.y};
    tPanOrig={x:pan.x,y:pan.y};
    tPinchZoom0=zoom;
    tPinchDist0=curDist;
    draw();return;
  }

  if(touches.length===1){
    const t=touches[0];
    const pos=getTouchPos(t);
    const dx=t.clientX-(tPanStart?tPanStart.x:t.clientX);
    const dy=t.clientY-(tPanStart?tPanStart.y:t.clientY);
    if(Math.abs(dx)>4||Math.abs(dy)>4){tDidDrag=true;clearTimeout(tLongTimer);}

    if(tDraggingNode){
      const w=toWo(pos.x,pos.y);
      if(selectedIds.size>1&&selectedIds.has(tDraggingNode.id)){
        const ddx=w.x-tDragOff.x-tDraggingNode.x,ddy=w.y-tDragOff.y-tDraggingNode.y;
        selectedIds.forEach(id=>{const n=nodes.find(n=>n.id===id);if(n){n.x+=ddx;n.y+=ddy;}});
        tDragOff={x:w.x-tDraggingNode.x,y:w.y-tDraggingNode.y};
      }else{tDraggingNode.x=w.x-tDragOff.x;tDraggingNode.y=w.y-tDragOff.y;}
      draw();
    }else if(tPanOrig){
      pan.x=tPanOrig.x+(t.clientX-tPanStart.x);
      pan.y=tPanOrig.y+(t.clientY-tPanStart.y);
      draw();
    }
  }
},{passive:false});

mc.addEventListener('touchend',e=>{
  clearTimeout(tLongTimer);
  e.preventDefault();

  if(e.changedTouches.length&&e.touches.length===0){
    if(tDraggingNode&&tDidDrag)pushH();
    // 탭 (드래그 없음) → 선택
    if(!tDidDrag&&tDraggingNode){
      selectedIds.clear();selectedIds.add(tDraggingNode.id);draw();
    }
    if(!tDidDrag&&!tDraggingNode){
      // 빈 곳 탭 → 선택 해제
      const pos=getTouchPos(e.changedTouches[0]);
      const hit=hitNode(pos.x,pos.y);
      if(!hit){selectedIds.clear();draw();}
    }
  }

  // 손가락 수가 줄어 1개 남으면 남은 터치로 패닝 재설정
  if(e.touches.length===1){
    touch2=null;
    const t=e.touches[0];
    tPanStart={x:t.clientX,y:t.clientY};
    tPanOrig={x:pan.x,y:pan.y};
    tDraggingNode=null;
  }

  if(e.touches.length===0){
    touch1=null;touch2=null;tDraggingNode=null;tPanStart=null;tPanOrig=null;tDidDrag=false;
  }
},{passive:false});

document.addEventListener('keydown',e=>{
  if(e.target===editor||e.target===pasteInput)return;
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();return;}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo();return;}
  const sel=[...selectedIds];
  if((e.key==='Delete'||e.key==='Backspace')&&sel.length){e.preventDefault();pushH();sel.forEach(id=>rmTree(id));selectedIds.clear();draw();return;}
  if(e.key==='Tab'&&sel.length===1){e.preventDefault();addChildNode(sel[0]);return;}
  if(e.key==='Enter'&&!e.shiftKey&&sel.length===1){e.preventDefault();const n=nodes.find(n=>n.id===sel[0]);if(n)openEditor(n);return;}
  if(e.key==='Escape'){closeCtxMenu();closeHlPicker();closePasteModal();confirmModal.classList.remove('open');selectedIds.clear();draw();}
  if((e.ctrlKey||e.metaKey)&&e.key==='a'){e.preventDefault();nodes.forEach(n=>selectedIds.add(n.id));draw();}
  // Ctrl+S: 클립보드 저장 단축키
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();document.getElementById('btn-copy').click();}
});

// ══════════════════════════════════════════════
// 노드 조작
// ══════════════════════════════════════════════
function addChildNode(parentId){
  pushH();const parent=nodes.find(n=>n.id===parentId);if(!parent)return;
  const kids=childrenOf(parentId),angle=kids.length?Math.random()*Math.PI*2:(Math.random()-.5)*Math.PI;
  const dist=depth(parentId)===0?200:150;
  const id=mkNode('새 노드',parent.x+Math.cos(angle)*dist,parent.y+Math.sin(angle)*dist,parentId);
  selectedIds.clear();selectedIds.add(id);draw();
  setTimeout(()=>{const n=nodes.find(n=>n.id===id);if(n)openEditor(n);},40);
}
function addSiblingNode(sibId){
  pushH();const p=parentOf(sibId);if(p==null){addChildNode(sibId);return;}
  const sib=nodes.find(n=>n.id===sibId),a=(Math.random()-.5)*Math.PI*.6;
  const id=mkNode('새 노드',sib.x+Math.cos(a)*150,sib.y+Math.sin(a)*150,p);
  selectedIds.clear();selectedIds.add(id);draw();
  setTimeout(()=>{const n=nodes.find(n=>n.id===id);if(n)openEditor(n);},40);
}
function addRootAt(wp){
  pushH();const id=mkNode('새 주제',wp.x,wp.y,null);
  selectedIds.clear();selectedIds.add(id);draw();
  setTimeout(()=>{const n=nodes.find(n=>n.id===id);if(n)openEditor(n);},40);
}

// ══════════════════════════════════════════════
// 인라인 편집기
// ══════════════════════════════════════════════
const editor=document.getElementById('node-editor');
let editTarget=null;
function openEditor(n){
  editTarget=n;const m=measure(n),s=toSc(n.x,n.y),rect=wrap.getBoundingClientRect();
  editor.style.left=(s.x-m.w/2*zoom+rect.left)+'px';editor.style.top=(s.y-m.h/2*zoom+rect.top)+'px';
  editor.style.width=(m.w*zoom)+'px';editor.style.minHeight=(m.h*zoom)+'px';editor.style.fontSize=(m.fz*zoom)+'px';
  editor.value=n.label;editor.style.display='block';editor.focus();editor.select();
  editor.addEventListener('input',resizeEd);resizeEd();
}
function resizeEd(){editor.style.height='auto';editor.style.height=editor.scrollHeight+'px';}
function closeEditor(){
  if(!editTarget)return;
  const nv=editor.value.trim()||editTarget.label;
  if(nv!==editTarget.label){pushH();editTarget.label=nv;}
  editor.style.display='none';editTarget=null;editor.removeEventListener('input',resizeEd);draw();
}
editor.addEventListener('blur',closeEditor);
editor.addEventListener('keydown',e=>{
  if(e.key==='Escape')editor.blur();
  if(e.key==='Tab'){e.preventDefault();editor.blur();if(editTarget)addChildNode(editTarget.id);}
});

// ══════════════════════════════════════════════
// 하이라이트 팝업
// ══════════════════════════════════════════════
const hlPicker=document.getElementById('hl-picker');
let hlTargets=[];
function showHlPicker(cx,cy,ids){
  hlTargets=ids;const row=hlPicker.querySelector('.hl-row');row.innerHTML='';
  const none=document.createElement('div');none.className='hl-dot none-dot';none.textContent='✕';none.title='없음';none.onclick=()=>applyHl(null);row.appendChild(none);
  HL.forEach(c=>{const d=document.createElement('div');d.className='hl-dot';d.style.background=c.dot;d.title=c.id;d.onclick=()=>applyHl(c.id);row.appendChild(d);});
  hlPicker.style.left=cx+'px';hlPicker.style.top=cy+'px';hlPicker.style.display='flex';
  setTimeout(()=>document.addEventListener('click',closeHlPicker,{once:true}),10);
}
function applyHl(colorId){pushH();hlTargets.forEach(id=>{const n=nodes.find(n=>n.id===id);if(n)n.hl=colorId;});closeHlPicker();draw();}
function closeHlPicker(){hlPicker.style.display='none';}

// ══════════════════════════════════════════════
// 컨텍스트 메뉴
// ══════════════════════════════════════════════
const ctxMenu=document.getElementById('ctx-menu');
function showCtxMenu(cx,cy,hit,mx,my){
  ctxMenu.innerHTML='';
  const item=(icon,label,fn,cls='')=>{const d=document.createElement('div');d.className='item '+(cls||'');d.innerHTML=`<span style="font-size:14px;line-height:1">${icon}</span><span>${label}</span>`;d.onclick=()=>{closeCtxMenu();fn();};ctxMenu.appendChild(d);};
  const sep=()=>{const d=document.createElement('div');d.className='csep';ctxMenu.appendChild(d);};
  const multi=[...selectedIds];
  if(multi.length>1){
    item('🎨',`하이라이트 (${multi.length}개)`,()=>showHlPicker(cx,cy,multi));
    sep();
    item('🗑',`${multi.length}개 노드 삭제`,()=>{pushH();multi.forEach(id=>rmTree(id));selectedIds.clear();draw();},'danger');
  }else if(hit){
    item('➕','자식 노드 추가 (Tab)',()=>addChildNode(hit.id));
    item('↔','형제 노드 추가',()=>addSiblingNode(hit.id));
    item('✏️','이름 편집 (Enter)',()=>openEditor(hit));
    sep();
    item('🎨','하이라이트 태그',()=>showHlPicker(cx,cy,[hit.id]));
    sep();
    item('🗑','노드 삭제 (하위 포함)',()=>{pushH();rmTree(hit.id);selectedIds.clear();draw();},'danger');
  }else{
    item('➕','새 루트 노드 추가',()=>addRootAt(toWo(mx,my)));
  }
  ctxMenu.style.left=cx+'px';ctxMenu.style.top=cy+'px';ctxMenu.style.display='block';
  setTimeout(()=>document.addEventListener('click',closeCtxMenu,{once:true}),10);
}
function closeCtxMenu(){ctxMenu.style.display='none';}

// 툴바
// ══════════════════════════════════════════════
document.getElementById('btn-undo').onclick=undo;
document.getElementById('btn-redo').onclick=redo;
document.getElementById('btn-child').onclick=()=>{const s=[...selectedIds];if(s.length===1)addChildNode(s[0]);};
document.getElementById('btn-sibling').onclick=()=>{const s=[...selectedIds];if(s.length===1)addSiblingNode(s[0]);};
document.getElementById('btn-root').onclick=()=>addRootAt(toWo(W/2+(Math.random()-.5)*120,H/2+(Math.random()-.5)*80));
document.getElementById('btn-fit').onclick=()=>{
  if(!nodes.length)return;
  const xs=nodes.map(n=>n.x),ys=nodes.map(n=>n.y);
  const cx=(Math.min(...xs)+Math.max(...xs))/2,cy=(Math.min(...ys)+Math.max(...ys))/2;
  zoom=Math.min(1.2,Math.min(W/((Math.max(...xs)-Math.min(...xs)||200)+200),H/((Math.max(...ys)-Math.min(...ys)||200)+140)));
  pan={x:-cx*zoom,y:-cy*zoom};draw();
};
document.getElementById('btn-reset').onclick=async()=>{
  const ok=await showConfirm('초기화','마인드맵을 초기화할까요? 현재 작업 내용이 모두 지워져요.');
  if(!ok)return;pushH();initDefault();draw();
};

// ══════════════════════════════════════════════
// 기본 데이터
// ══════════════════════════════════════════════
function initDefault(){
  nodes=[];edges=[];nextId=1;selectedIds.clear();
  const root=mkNode('중심 주제',0,0);
  [{label:'아이디어 A',angle:-140,dist:220,subs:['세부 항목 1','세부 항목 2','세부 항목 3']},{label:'아이디어 B',angle:-40,dist:220,subs:['내용 A','내용 B']},{label:'아이디어 C',angle:40,dist:220,subs:['항목 1','항목 2','항목 3']},{label:'아이디어 D',angle:140,dist:220,subs:['메모','아이디어']}].forEach(b=>{
    const rad=b.angle*Math.PI/180,bx=Math.cos(rad)*b.dist,by=Math.sin(rad)*b.dist;
    const bid=mkNode(b.label,bx,by,root);
    b.subs.forEach((s,j)=>{const srad=rad+(j-(b.subs.length-1)/2)*.5;mkNode(s,bx+Math.cos(srad)*155,by+Math.sin(srad)*155,bid);});
  });
  pan={x:0,y:0};zoom=1;
}

initDefault();syncUB();
window.addEventListener('resize',resize);
resize();
</script>
